<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Binding of Isaac</title>
  <script src="ruffle/ruffle.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 10px;
    }
    #game { display: none; }
    #player-wrapper {
      position: relative;
      width: 800px;
      height: 600px;
    }
    #player-wrapper ruffle-player {
      width: 100%;
      height: 100%;
    }
    #fullscreen-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: background 0.2s;
    }
    #fullscreen-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* When the wrapper itself is fullscreen */
    #player-wrapper:fullscreen,
    #player-wrapper:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #player-wrapper:fullscreen ruffle-player,
    #player-wrapper:-webkit-full-screen ruffle-player {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="player-wrapper">
    <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>
  </div>

  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.addEventListener("load", () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      document.getElementById("player-wrapper").prepend(player);
      player.load("isaac.swf");

      const btn = document.getElementById("fullscreen-btn");
      const wrapper = document.getElementById("player-wrapper");

      btn.addEventListener("click", () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          (wrapper.requestFullscreen || wrapper.webkitRequestFullscreen).call(wrapper);
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        }
      });

      // Swap icon based on state
      document.addEventListener("fullscreenchange", updateIcon);
      document.addEventListener("webkitfullscreenchange", updateIcon);

      function updateIcon() {
        btn.textContent = (document.fullscreenElement || document.webkitFullscreenElement)
          ? "✕"
          : "⛶";
      }
    });
  </script>
</body>
</html>
